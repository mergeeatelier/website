    // its OWN frames — from local text at the root, or text obtained from

    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own

    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.

    const blobUrls = {};
    const resourceBlobs = {};

    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down

      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }

      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];

        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }

      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {

      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.

        if (ownFrameWindows().indexOf(e.source) < 0) return;

        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'

        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach

    // consumers read these Blobs directly. Survives the swap like the error sink.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

    // DOMParser/replaceWith are inert per spec — re-create each with

    // preserve ordering (React before ReactDOM before Babel before text/babel).

    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });

        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];

        s.removeAttribute('src');

      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --color-bg: #f3f2f2;\n  --color-surface: #eae9e9;\n  --color-text: #201e1d;\n  --color-accent: #ec3013;\n  --color-accent-2: #e15b47;\n  --color-divider: color-mix(in srgb, #201e1d 40%, transparent);\n\n  /* Tonal ramps — generated in OKLCH on one shared lightness scale, so the\n     same step of any role matches the others in visual value. */\n  --color-neutral-100: #f8f4f4;\n  --color-neutral-200: #eae7e7;\n  --color-neutral-300: #d7d3d3;\n  --color-neutral-400: #bab6b6;\n  --color-neutral-500: #9b9797;\n  --color-neutral-600: #7d7979;\n  --color-neutral-700: #605d5d;\n  --color-neutral-800: #444141;\n  --color-neutral-900: #2d2b2b;\n\n  --color-accent-100: #fff2ef;\n  --color-accent-200: #ffe0d9;\n  --color-accent-300: #ffc4b8;\n  --color-accent-400: #ff9783;\n  --color-accent-500: #ff563c;\n  --color-accent-600: #dd2b0f;\n  --color-accent-700: #ae1800;\n  --color-accent-800: #7c1405;\n  --color-accent-900: #4d170e;\n\n  --color-accent-2-100: #fff2ef;\n  --color-accent-2-200: #ffe0da;\n  --color-accent-2-300: #ffc4b9;\n  --color-accent-2-400: #ff9784;\n  --color-accent-2-500: #ef6853;\n  --color-accent-2-600: #c94b39;\n  --color-accent-2-700: #9e3526;\n  --color-accent-2-800: #71261b;\n  --color-accent-2-900: #471d16;\n\n  --font-heading: \"Archivo\", system-ui, sans-serif;\n  --font-heading-weight: 800;\n  --font-body: \"Archivo\", system-ui, sans-serif;\n\n  --space-1: 4.0px;\n  --space-2: 8.0px;\n  --space-3: 12.0px;\n  --space-4: 16.0px;\n  --space-6: 24.0px;\n  --space-8: 32.0px;\n\n  --radius-sm: 0px;\n  --radius-md: 0px;\n  --radius-lg: 0px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2d2b2b 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2d2b2b 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.grayscale{filter:grayscale(1) contrast(1.08)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 2px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); justify-content: flex-start; text-align: left; }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: 2px solid var(--color-divider);\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 2px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid var(--color-divider);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space u002Fdiv>\n        <div class=\"field\" style=\"grid-column:1/-1\">\n          <label>{{ t.imageLabel }}<\u002Flabel>\n          <sc-if value=\"{{ form.image_url }}\" hint-placeholder-val=\"{{ false }}\">\n            <img src=\"{{ form.image_url }}\" style=\"width:96px;height:64px;object-fit:cover;border:2px solid var(--color-divider);border-radius:6px;margin-bottom:10px;display:block\">\n          <\u002Fsc-if>\n          <button type=\"button\" class=\"btn btn-secondary btn-block\" style=\"text-align:center;justify-content:center\" sc-camel-on-click=\"{{ triggerImagePick }}\" disabled=\"{{ imagePicking }}\">{{ imagePickLabel }}<\u002Fbutton>\n          <input ref=\"{{ imageInputRef }}\" type=\"file\" accept=\"image/*\" style=\"display:none\" sc-camel-on-change=\"{{ onImagePick }}\">\n          <input class=\"input\" style=\"margin-top:10px\" value=\"{{ form.image_url }}\" sc-camel-on-change=\"{{ onField_image_url }}\" placeholder=\"หรือวางลิงก์รูปภาพ (https://...)\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <hr class=\"hr\" style=\"margin:20px 0\">\n      <div style=\"font-size:12px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.6;margin-bottom:12px\">{{ t.buttonsLabel }}<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px 20px\">\n        <div class=\"field\"><label>{{ t.btnLabelLabel }} 1<\u002Flabel><input class=\"input\" value=\"{{ form.button1_label }}\" sc-camel-on-change=\"{{ onField_button1_label }}\" placeholder=\"Shopee\"><\u002Fdiv>\n        <div class=\"field\"><label>{{ t.btnUrlLabel }} 1<\u002Flabel><input class=\"input\" value=\"{{ form.button1_url }}\" sc-camel-on-change=\"{{ onField_button1_url }}\"><\u002Fdiv>\n        <sc-if value=\"{{ showButton2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div class=\"field\"><label>{{ t.btnLabelLabel }} 2<\u002Flabel><input class=\"input\" value=\"{{ form.button2_label }}\" sc-camel-on-change=\"{{ onField_button2_label }}\" placeholder=\"Lazada\"><\u002Fdiv>\n          <div class=\"field\"><label>{{ t.btnUrlLabel }} 2<\u002Flabel><input class=\"input\" value=\"{{ form.button2_url }}\" sc-camel-on-change=\"{{ onField_button2_url }}\"><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showButton3 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div class=\"field\"><label>{{ t.btnLabelLabel }} 3<\u002Flabel><input class=\"input\" value=\"{{ form.button3_label }}\" sc-camel-on-change=\"{{ onField_button3_label }}\"><\u002Fdiv>\n          <div class=\"field\"><label>{{ t.btnUrlLabel }} 3<\u002Flabel><input class=\"input\" value=\"{{ form.button3_url }}\" sc-camel-on-change=\"{{ onField_button3_url }}\"><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showButton4 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div class=\"field\"><label>{{ t.btnLabelLabel }} 4<\u002Flabel><input class=\"input\" value=\"{{ form.button4_label }}\" sc-camel-on-change=\"{{ onField_button4_label }}\"><\u002Fdiv>\n          <div class=\"field\"><label>{{ t.btnUrlLabel }} 4<\u002Flabel><input class=\"input\" value=\"{{ form.button4_url }}\" sc-camel-on-change=\"{{ onField_button4_url }}\"><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <sc-if value=\"{{ canAddButton }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;justify-content:flex-end;margin-top:14px\">\n          <button type=\"button\" class=\"btn btn-secondary\" style=\"color:#000\" sc-camel-on-click=\"{{ addButtonRow }}\">+ {{ t.addButton }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"display:flex;gap:12px;margin-top:24px;justify-content:center\">\n        <button class=\"btn\" style=\"background:#3a3634;color:#fff;border-color:#3a3634\" sc-camel-on-click=\"{{ saveProduct }}\" disabled=\"{{ saving }}\">{{ saveLabel }}<\u002Fbutton>\n        <button class=\"btn btn-ghost\" style=\"color:#000\" sc-camel-on-click=\"{{ closeForm }}\">{{ t.cancel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst SHEET_ID = '1-v4AqZ7A4dZKiBzjq_s-YGsw7P8Comd1_D2FdIfoOxE';\nconst SHEET_CSV = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=Products';\nconst SHEET_API = 'https://script.google.com/macros/s/AKfycbxET2jSvgsumKUjC71WOsqpRyrpB69XO1PhNkUmJwltfIxVfta1DNMzPpQV1KT-8xxt/exec';\nconst ADMIN_PIN = 'mergee2026';\nconst FIELDS = ['id', 'name_th', 'name_en', 'price', 'tags', 'status', 'image_url',\n  'button1_label', 'button1_url', 'button2_label', 'button2_url',\n  'button3_label', 'button3_url', 'button4_label', 'button4_url'];\nconst STATUS_LABELS = {\n  th: { in_stock: 'พร้อมส่ง', preorder: 'พรีออเดอร์', made_to_order: 'สั่งทำ' },\n  en: { in_stock: 'In Stock', preorder: 'Pre-order', made_to_order: 'Made to Order' },\n};\nconst STATUS_ORDER = ['in_stock', 'preorder', 'made_to_order'];\n\nfunction parseCSV(text) {\n  const rows = [];\n  let row = [], field = '', inQuotes = false;\n  for (let i = 0; i < text.length; i++) {\n    const c = text[i], next = text[i + 1];\n    if (inQuotes) {\n      if (c === '\"' && next === '\"') { field += '\"'; i++; }\n      else if (c === '\"') { inQuotes = false; }\n      else field += c;\n    } else if (c === '\"') inQuotes = true;\n    else if (c === ',') { row.push(field); field = ''; }\n    else if (c === '\\n' || c === '\\r') {\n      if (c === '\\r' && next === '\\n') i++;\n      row.push(field); field = '';\n      if (row.some((f) => f !== '')) rows.push(row);\n      row = [];\n    } else field += c;\n  }\n  if (field !== '' || row.length) { row.push(field); rows.push(row); }\n  if (!rows.length) return [];\n  const headers = rows[0];\n  return rows.slice(1).filter((r) => r[0]).map((r) => {\n    const obj = {};\n    headers.forEach((h, i) => obj[h] = r[i] || '');\n    return obj;\n  });\n}\n\nfunction blankForm(id) {\n  const f = { id: id || '' };\n  FIELDS.forEach((k) => { if (!(k in f)) f[k] = ''; });\n  return f;\n}\n\nconst T = {\n  th: {\n    viewCustomer: 'ดูหน้าเว็บไซด์', kicker: 'จัดการข้อมูล', heading: 'ผลงานของเรา', itemsUnit: 'รายการ',\n    loadErrorText: 'โหลดรายการสินค้าไม่สำเร็จ ลองรีเฟรชหน้า', addNew: 'เพิ่มสินค้าใหม่',\n    edit: 'แก้ไข', delete: 'ลบ', previewLabel: 'พรีวิวการ์ดสินค้า', dropHint: 'ลากรูปมาวาง หรือคลิกเพื่อเลือก',\n    panX: 'เลื่อนซ้าย-ขวา', panY: 'เลื่อนบน-ล่าง', zoom: 'ซูม', applyCrop: 'ใช้ตำแหน่งนี้',\n    idLabel: 'รหัสสินค้า (id)', priceLabel: 'ราคา (บาท)', nameThLabel: 'ชื่อสินค้า (ไทย)', nameEnLabel: 'ชื่อสินค้า (English)',\n    tagsLabel: 'Tag (คั่นด้วยจุลภาค — ใช้กรอง dropdown)', statusLabel: 'สถานะสินค้า (โชว์บนการ์ด)', statusNone: '— ไม่ระบุ —', imageLabel: 'รูปภาพสินค้า',\n    buttonsLabel: 'รายการปุ่ม (สูงสุด 4 ปุ่ม)', btnLabelLabel: 'ปุ่ม — ชื่อ', btnUrlLabel: 'ปุ่ม — ลิงก์',\n    addButton: 'เพิ่มปุ่ม', cancel: 'ยกเลิก', searchPlaceholder: 'ค้นหาชื่อสินค้า...', allCategories: 'ทั้งหมด', cardView: 'แบบการ์ด', listView: 'แบบรายการ',\n  },\n  en: {\n    viewCustomer: 'Website Page', kicker: 'Manage Data', heading: 'Our Creations', itemsUnit: 'items',\n    loadErrorText: 'Could not load products — please refresh.', addNew: 'Add New Product',\n    edit: 'Edit', delete: 'Delete', previewLabel: 'Card Preview', dropHint: 'Drag a photo here, or click to browse',\n    panX: 'Pan left-right', panY: 'Pan up-down', zoom: 'Zoom', applyCrop: 'Apply this crop',\n    idLabel: 'Product ID', priceLabel: 'Price (THB)', nameThLabel: 'Name (Thai)', nameEnLabel: 'Name (English)',\n    tagsLabel: 'Tags (comma-separated — powers the dropdown)', statusLabel: 'Availability (shows on card)', statusNone: '— none —', imageLabel: 'Product Image',\n    buttonsLabel: 'Order Buttons (up to 4)', btnLabelLabel: 'Button — Label', btnUrlLabel: 'Button — Link',\n    addButton: 'Add Button', cancel: 'Cancel', searchPlaceholder: 'Search product name...', allCategories: 'All', cardView: 'Card view', listView: 'List view',\n  },\n};\n\nclass Component extends DCLogic {\n  state = {\n    unlocked: false, pin: '', pinError: false,\n    products: [], loading: true, loadError: false,\n    form: blankForm(''), editingId: null, saving: false, saveNotice: '',\n    formOpen: false, imagePicking: false, buttonRows: 1, lang: 'th', reframe: { x: 50, y: 50, zoom: 1 }, imgDims: null, dragging: false,\n    search: '', category: 'all', viewMode: 'card',\n  };\n\n  setViewCard = () => this.setState({ viewMode: 'card' });\n  setViewList = () => this.setState({ viewMode: 'list' });\n  onSearchChange = (e) => this.setState({ search: e.target.value });\n  onCategoryChange = (e) => this.setState({ category: e.target.value });\n\n  toggleLang = () => this.setState((s) => ({ lang: s.lang === 'th' ? 'en' : 'th' }));\n\n  countButtonRows(p) {\n    let n = 1;\n    for (let i = 4; i >= 2; i--) {\n      if ((p['button' + i + '_label'] || '') || (p['button' + i + '_url'] || '')) { n = i; break; }\n    }\n    return n;\n  }\n  addButtonRow = () => this.setState((s) => ({ buttonRows: Math.min(4, s.buttonRows + 1) }));\n\n  imageInputEl = null;\n  imageInputRef = (node) => { this.imageInputEl = node; };\n  triggerImagePick = () => { if (this.imageInputEl) this.imageInputEl.click(); };\n\n  onImagePick = async (e) => {\n    const file = e.target.files && e.target.files[0];\n    e.target.value = '';\n    if (!file) return;\n    this.setState({ imagePicking: true });\n    try {\n      const bitmap = await createImageBitmap(file);\n      const CELL_LIMIT = 45000;\n      let cap = 900, quality = 0.72, dataUrl = '';\n      for (let attempt = 0; attempt < 8; attempt++) {\n        const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));\n        const w = Math.round(bitmap.width * scale), h = Math.round(bitmap.height * scale);\n        const canvas = document.createElement('canvas');\n        canvas.width = w; canvas.height = h;\n        canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);\n        dataUrl = canvas.toDataURL('image/jpeg', quality);\n        if (dataUrl.length <= CELL_LIMIT) break;\n        if (quality > 0.4) quality -= 0.12;\n        else cap = Math.round(cap * 0.8);\n      }\n      if (dataUrl.length > CELL_LIMIT) {\n        this.setState({ imagePicking: false });\n        window.alert('รูปนี้มีรายละเอียดสูงเกินไป ไม่สามารถบันทึกได้ กรุณาลองรูปอื่น');\n        return;\n      }\n      this.setState((s) => ({ form: { ...s.form, image_url: dataUrl }, imagePicking: false, reframe: { x: 50, y: 50, zoom: 1 } }));\n      this.loadImgDims(dataUrl);\n    } catch (err) {\n      this.setState({ imagePicking: false });\n      window.alert('ไม่สามารถอ่านรูปนี้ได้ ลองรูปอื่น');\n    }\n  };\n\n  componentDidMount() {\n    this.loadProducts();\n  }\n\n  loadProducts() {\n    fetch(SHEET_CSV)\n      .then((r) => { if (!r.ok) throw new Error('bad'); return r.text(); })\n      .then((text) => this.setState({ products: parseCSV(text), loading: false }))\n      .catch(() => this.setState({ loadError: true, loading: false }));\n  }\n\n  onPinChange = (e) => this.setState({ pin: e.target.value, pinError: false });\n  tryUnlock = (e) => {\n    e.preventDefault();\n    if (this.state.pin === ADMIN_PIN) this.setState({ unlocked: true });\n    else this.setState({ pinError: true });\n  };\n\n  stopClick = (e) => e.stopPropagation();\n\n  fieldRefs = {};\n  makeFieldHandler(key) {\n    if (!this.fieldRefs[key]) {\n      this.fieldRefs[key] = (e) => this.setState((s) => ({ form: { ...s.form, [key]: e.target.value } }));\n    }\n    return this.fieldRefs[key];\n  }\n\n  nextId() {\n    let max = 0;\n    this.state.products.forEach((p) => {\n      const m = /^PC-(\\d+)$/.exec(p.id || '');\n      if (m) max = Math.max(max, parseInt(m[1], 10));\n    });\n    return 'PC-' + String(max + 1).padStart(3, '0');\n  }\n\n  startAdd = () => this.setState({ form: blankForm(this.nextId()), editingId: null, saveNotice: '', formOpen: true, buttonRows: 1, reframe: { x: 50, y: 50, zoom: 1 }, imgDims: null });\n  loadImgDims(url) {\n    if (!url) { this.setState({ imgDims: null }); return; }\n    const img = new Image();\n    img.onload = () => this.setState({ imgDims: { w: img.naturalWidth, h: img.naturalHeight } });\n    img.src = url;\n  }\n  geom(reframe, imgDims) {\n    const W = 260, H = 130;\n    const coverScale = Math.max(W / imgDims.w, H / imgDims.h);\n    const eff = coverScale;\n    const dw = imgDims.w * eff, dh = imgDims.h * eff;\n    const left = (W - dw) * (reframe.x / 100);\n    const top = (H - dh) * (reframe.y / 100);\n    return { W, H, eff, dw, dh, left, top };\n  }\n  onDragStart = (e) => {\n    const { imgDims, reframe } = this.state;\n    if (!imgDims) return;\n    const g = this.geom(reframe, imgDims);\n    e.currentTarget.setPointerCapture(e.pointerId);\n    this._drag = { startX: e.clientX, startY: e.clientY, left: g.left, top: g.top, dw: g.dw, dh: g.dh, W: g.W, H: g.H };\n    this.setState({ dragging: true });\n  };\n  onDragMove = (e) => {\n    if (!this._drag) return;\n    const d = this._drag;\n    let newLeft = d.left + (e.clientX - d.startX);\n    let newTop = d.top + (e.clientY - d.startY);\n    const minLeft = d.W - d.dw, minTop = d.H - d.dh;\n    newLeft = Math.min(0, Math.max(minLeft, newLeft));\n    newTop = Math.min(0, Math.max(minTop, newTop));\n    const x = minLeft !== 0 ? (newLeft / minLeft) * 100 : 50;\n    const y = minTop !== 0 ? (newTop / minTop) * 100 : 50;\n    this.setState((s) => ({ reframe: { ...s.reframe, x, y } }));\n  };\n  onDragEnd = () => {\n    this._drag = null;\n    this.setState({ dragging: false });\n  };\n  bakeCrop() {\n    const { imgDims, reframe, form } = this.state;\n    if (!imgDims || !form.image_url || !/^data:image\\//.test(form.image_url)) {\n      return Promise.resolve(form.image_url);\n    }\n    const g = this.geom(reframe, imgDims);\n    const srcX = -g.left / g.eff, srcY = -g.top / g.eff, srcW = g.W / g.eff, srcH = g.H / g.eff;\n    return new Promise((resolve) => {\n      const img = new Image();\n      img.onload = () => {\n        const CELL_LIMIT = 45000;\n        let destW = 900, destH = 450, quality = 0.72, dataUrl = '';\n        for (let attempt = 0; attempt < 8; attempt++) {\n          const canvas = document.createElement('canvas');\n          canvas.width = destW; canvas.height = destH;\n          canvas.getContext('2d').drawImage(img, srcX, srcY, srcW, srcH, 0, 0, destW, destH);\n          dataUrl = canvas.toDataURL('image/jpeg', quality);\n          if (dataUrl.length <= CELL_LIMIT) break;\n          if (quality > 0.4) quality -= 0.12;\n          else { destW = Math.round(destW * 0.8); destH = Math.round(destH * 0.8); }\n        }\n        resolve(dataUrl);\n      };\n      img.onerror = () => resolve(form.image_url);\n      img.src = form.image_url;\n    });\n  }\n  closeForm = () => this.setState({ formOpen: false });\n  closeFormBackdrop = () => this.setState({ formOpen: false });\n\n  editRefs = {};\n  makeEditHandler(p) {\n    if (!this.editRefs[p.id]) {\n      this.editRefs[p.id] = () => {\n        const f = blankForm(p.id);\n        FIELDS.forEach((k) => { f[k] = p[k] || ''; });\n        this.setState({ form: f, editingId: p.id, saveNotice: '', formOpen: true, buttonRows: this.countButtonRows(f), reframe: { x: 50, y: 50, zoom: 1 }, imgDims: null });\n        this.loadImgDims(f.image_url);\n      };\n    }\n    return this.editRefs[p.id];\n  }\n\n  deleteRefs = {};\n  makeDeleteHandler(id) {\n    if (!this.deleteRefs[id]) {\n      this.deleteRefs[id] = () => {\n        if (!window.confirm('ลบสินค้า ' + id + ' ใช่ไหม?')) return;\n        fetch(SHEET_API, {\n          method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },\n          body: JSON.stringify({ action: 'delete', id }),\n        }).catch(() => {});\n        this.setState((s) => ({\n          products: s.products.filter((p) => p.id !== id),\n          saveNotice: 'ลบ ' + id + ' แล้ว',\n        }));\n      };\n    }\n    return this.deleteRefs[id];\n  }\n\n  saveProduct = async () => {\n    if (!this.state.form.id) { this.setState({ saveNotice: 'กรุณาใส่รหัสสินค้า (id)' }); return; }\n    this.setState({ saving: true });\n    const finalImageUrl = await this.bakeCrop();\n    const product = {};\n    FIELDS.forEach((k) => product[k] = this.state.form[k] || '');\n    product.image_url = finalImageUrl || '';\n    fetch(SHEET_API, {\n      method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },\n      body: JSON.stringify({ action: 'upsert', product }),\n    }).catch(() => {});\n    this.setState((s) => {\n      const exists = s.products.some((p) => p.id === product.id);\n      const products = exists\n        ? s.products.map((p) => (p.id === product.id ? product : p))\n        : s.products.concat([product]);\n      return {\n        products, saving: false, editingId: null, formOpen: false,\n        form: blankForm(''),\n        saveNotice: (exists ? 'บันทึกการแก้ไข ' : 'เพิ่มสินค้า ') + product.id + ' แล้ว',\n      };\n    });\n  };\n\n  renderVals() {\n    const lang = this.state.lang;\n    const t = T[lang];\n    const tagSet = new Set();\n    this.state.products.forEach((p) => String(p.tags || '').split(',').forEach((tg) => { tg = tg.trim(); if (tg) tagSet.add(tg); }));\n    const categoryOptions = [{ value: 'all', label: t.allCategories }].concat(\n      Array.from(tagSet).sort().map((tg) => ({ value: tg, label: tg }))\n    );\n    const statusOptions = [{ value: '', label: t.statusNone }].concat(\n      STATUS_ORDER.map((k) => ({ value: k, label: STATUS_LABELS[lang][k] }))\n    );\n    const searchLower = this.state.search.trim().toLowerCase();\n    const filtered = this.state.products.filter((p) => {\n      const matchesCategory = this.state.category === 'all' || String(p.tags || '').split(',').map((s) => s.trim()).includes(this.state.category);\n      const matchesSearch = !searchLower || (p.name_th || '').toLowerCase().includes(searchLower) || (p.name_en || '').toLowerCase().includes(searchLower);\n      return matchesCategory && matchesSearch;\n    });\n    const products = filtered.map((p) => ({\n      ...p,\n      name: (lang === 'th' ? p.name_th : p.name_en) || p.name_th || p.name_en || '',\n      priceDisp: p.price ? '฿' + Number(p.price).toLocaleString() : '',\n      buttons: [1, 2, 3, 4]\n        .map((n) => ({ label: p['button' + n + '_label'], url: p['button' + n + '_url'] }))\n        .filter((b) => b.label || b.url),\n      statusLabel: p.status && STATUS_LABELS[lang][p.status] || '',\n      onEdit: this.makeEditHandler(p),\n      onDelete: this.makeDeleteHandler(p.id),\n    }));\n    return {\n      search: this.state.search, onSearchChange: this.onSearchChange,\n      category: this.state.category, onCategoryChange: this.onCategoryChange, categoryOptions, statusOptions,\n      viewIsCard: this.state.viewMode === 'card', viewIsList: this.state.viewMode === 'list',\n      setViewCard: this.setViewCard, setViewList: this.setViewList,\n      cardBtnBg: this.state.viewMode === 'card' ? 'var(--color-text)' : 'transparent',\n      cardBtnColor: this.state.viewMode === 'card' ? 'var(--color-bg)' : 'var(--color-text)',\n      listBtnBg: this.state.viewMode === 'list' ? 'var(--color-text)' : 'transparent',\n      listBtnColor: this.state.viewMode === 'list' ? 'var(--color-bg)' : 'var(--color-text)',\n      t, langLabel: lang === 'th' ? 'EN' : 'TH', toggleLang: this.toggleLang,\n      unlocked: this.state.unlocked, pin: this.state.pin, pinError: this.state.pinError,\n      onPinChange: this.onPinChange, tryUnlock: this.tryUnlock,\n      loadError: this.state.loadError, saveNotice: this.state.saveNotice,\n      form: this.state.form, editingId: this.state.editingId, saving: this.state.saving,\n      formOpen: this.state.formOpen, closeForm: this.closeForm, closeFormBackdrop: this.closeFormBackdrop, stopClick: this.stopClick,\n      imageInputRef: this.imageInputRef, triggerImagePick: this.triggerImagePick, onImagePick: this.onImagePick,\n      showButton2: this.state.buttonRows >= 2, showButton3: this.state.buttonRows >= 3, showButton4: this.state.buttonRows >= 4,\n      canAddButton: this.state.buttonRows < 4, addButtonRow: this.addButtonRow,\n      imagePicking: this.state.imagePicking,\n      imagePickLabel: this.state.imagePicking ? 'กำลังโหลดรูป...' : 'เลือกรูปภาพสินค้า',\n      previewSlotId: 'preview-' + (this.state.form.id || 'new'),\n      onDragStart: this.onDragStart, onDragMove: this.onDragMove, onDragEnd: this.onDragEnd,\n      dragCursor: this.state.form.image_url ? (this.state.dragging ? 'grabbing' : 'grab') : 'pointer',\n      reframeImgStyle: (() => {\n        const { imgDims, reframe } = this.state;\n        if (!imgDims) return 'width:100%;height:100%;object-fit:cover';\n        const g = this.geom(reframe, imgDims);\n        return 'position:absolute;left:' + g.left + 'px;top:' + g.top + 'px;width:' + g.dw + 'px;height:' + g.dh + 'px;max-width:none;user-select:none';\n      })(),\n      previewButtons: Array.from({ length: this.state.buttonRows }, (_, i) => {\n        const n = i + 1;\n        return { label: this.state.form['button' + n + '_label'] || 'ปุ่ม ' + n };\n      }),\n      previewName: this.state.form.name_th || 'ชื่อสินค้า',\n      previewPrice: this.state.form.price ? '฿' + Number(this.state.form.price).toLocaleString() : '฿0',\n      previewStatusLabel: this.state.form.status && STATUS_LABELS[lang][this.state.form.status] || '',\n      formTitle: this.state.editingId ? 'แก้ไขสินค้า: ' + this.state.editingId : 'เพิ่มสินค้าใหม่',\n      saveLabel: this.state.saving ? 'กำลังบันทึก...' : (this.state.editingId ? 'บันทึกการแก้ไข' : 'เพิ่มสินค้า'),\n      startAdd: this.startAdd, saveProduct: this.saveProduct,\n      products, productCount: products.length,\n      onField_id: this.makeFieldHandler('id'),\n      onField_price: this.makeFieldHandler('price'),\n      onField_name_th: this.makeFieldHandler('name_th'),\n      onField_name_en: this.makeFieldHandler('name_en'),\n      onField_tags: this.makeFieldHandler('tags'),\n      onField_status: this.makeFieldHandler('status'),\n      onField_image_url: this.makeFieldHandler('image_url'),\n      onField_button1_label: this.makeFieldHandler('button1_label'),\n      onField_button1_url: this.makeFieldHandler('button1_url'),\n      onField_button2_label: this.makeFieldHandler('button2_label'),\n      onField_button2_url: this.makeFieldHandler('button2_url'),\n      onField_button3_label: this.makeFieldHandler('button3_label'),\n      onField_button3_url: this.makeFieldHandler('button3_url'),\n      onField_button4_label: this.makeFieldHandler('button4_label'),\n      onField_button4_url: this.makeFieldHandler('button4_url'),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
